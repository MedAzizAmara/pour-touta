<main class="page">
  <div class="panel">
    <header class="topbar">
      <div class="brand">Touta</div>

      <nav class="nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Accueil</a>
        <a routerLink="/messages" routerLinkActive="active">Messages</a>
        <a routerLink="/amitie" routerLinkActive="active">Amitie</a>
        <a routerLink="/message-special" routerLinkActive="active">Special</a>
        <a routerLink="/voeux" routerLinkActive="active">Voeux</a>
      </nav>
    </header>

    <section class="hero hero-home">
      <div class="hero-copy">
        <h1 class="hero-title">
          <span>Joyeux anniversaire,</span>
          <span>Touta</span>
        </h1>
        <p>
          Aujourd hui, je voulais simplement te dedier cette petite page,
          Touta, pour te souhaiter une tres belle journee et te rappeler que tu
          es une personne precieuse.
        </p>

        <div class="actions actions-home">
          <a class="button button-outline" routerLink="/messages">LIRE LES MESSAGES</a>
          <a class="button button-special" routerLink="/message-special">MESSAGE SPECIAL</a>
          <a class="button button-filled" routerLink="/voeux">VOIR MES VOEUX</a>
        </div>
      </div>
